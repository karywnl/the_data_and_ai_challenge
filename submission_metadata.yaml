ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for data exploration, architecture discussion, and
  code authoring/review. All design decisions, trap analysis, and scoring logic
  were driven and verified by the team. No candidate data was sent to any hosted
  LLM, and no LLM is called during the ranking step (per the compute constraints).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker. We first profiled all 100k candidates and found the skills array
  is noise (every skill ~12k occurrences, uniformly sprayed) — so we ignore it and
  read title + career-history free-text + trajectory + behavioral signals instead.

  Five components: (1) semantic match of career text against the JD split into
  positive AND negative facet queries (retrieval/ranking/eval vs research-only,
  CV/speech, consulting); (2) a role/title classifier with explicit sub-traps for
  AI-Research, Computer-Vision and Junior-ML titles; (3) career-text evidence of
  production retrieval/ranking/evaluation, with consulting-only and title-chaser
  penalties; (4) experience-band and location fit; (5) a behavioral availability
  multiplier (response rate, recency, open-to-work) that down-weights perfect-on-
  paper-but-unreachable candidates. A strict honeypot guard forces impossible
  profiles to the bottom. Reasoning is generated from profile facts only.
  Embedding is one-time offline; the ranking step is matrix math, well under 5 min.

